server:
  http_listen_port: 9080
  grpc_listen_port: 0
positions:
  filename: /var/positions/positions.yaml
clients:
  - url: http://loki:3100/loki/api/v1/push
scrape_configs:
  - job_name: django-security
    static_configs:
      - targets: [localhost]
        labels:
          job: django-security
          app: rss-bank
          __path__: /var/log/django/security.log
  - job_name: django-access
    static_configs:
      - targets: [localhost]
        labels:
          job: django-access
          app: rss-bank
          __path__: /var/log/django/access.log
