apiVersion: 1

policies:
  - orgId: 1
    receiver: Email SOC SEDAD
    group_by: ["alertname", "severity"]
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 1h
    routes:
      - receiver: Email SOC SEDAD
        matchers:
          - severity = "critical"
        group_wait: 10s
        repeat_interval: 30m
      - receiver: Email SOC SEDAD
        matchers:
          - severity = "high"
        group_wait: 30s
        repeat_interval: 1h
