              refId: threshold
              reducer: last
              expression: query
          - refId: condition
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              refId: condition
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  query: { params: [threshold] }
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Tentative injection SQL sur SEDAD BANK"
          description: "Une tentative SQL injection a ete detectee."
        labels:
          severity: critical
          team: soc

      - uid: alert-xss
