              expression: query
          - refId: condition
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: threshold
              refId: condition
              conditions:
                - evaluator: { params: [0], type: gt }
                  operator: { type: and }
                  query: { params: [threshold] }
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: "Tentative XSS sur SEDAD BANK"
          description: "Attaque XSS detectee dans les requetes."
        labels:
          severity: high
          team: soc

      - uid: alert-unauthorized-spike
        title: "Pic erreurs 401"
        condition: condition
        data:
          - refId: query
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: loki-main
            model:
              expr: 'count_over_time({job="django-security"} |= "UNAUTHORIZED" [5m])'
              queryType: range
