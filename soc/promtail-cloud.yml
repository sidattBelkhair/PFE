server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/positions/positions.yaml

clients:
  # Grafana Cloud Loki — remplace USER_ID et API_TOKEN
  - url: https://1538328:glc_eyJvIjoiMTcxODk1NCIsIm4iOiJzdGFjay0xNTgwNTM5LWhsLXJlYWQtbG9raSIsImsiOiJydzZMbGtUeDFCOG05N1c3N3hQQnA3MTEiLCJtIjp7InIiOiJwcm9kLWV1LWNlbnRyYWwtMCJ9fQ==@logs-prod-039.grafana.net/loki/api/v1/push

scrape_configs:
  - job_name: django-security
    static_configs:
      - targets:
          - localhost
        labels:
          job: django-security
          app: rss-bank
          env: production
          __path__: /var/log/django/security.log
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            event: event
            ip: ip
      - labels:
          event:
          ip:
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05Z"

  - job_name: django-access
    static_configs:
      - targets:
          - localhost
        labels:
          job: django-access
          app: rss-bank
          env: production
          __path__: /var/log/django/access.log
    pipeline_stages:
      - json:
          expressions:
            ts: ts
            method: method
            status: status
            ip: ip
      - labels:
          method:
          status:
          ip:
      - timestamp:
          source: ts
          format: "2006-01-02T15:04:05Z"
