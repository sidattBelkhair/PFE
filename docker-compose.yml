services:
  # ─────────────────────────────────────────────
  #  BASE DE DONNÉES
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: sedad_bank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  #  BACKEND DJANGO
  # ─────────────────────────────────────────────
  backend:
    build: ./backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend/media:/app/media
      - ./backend/logs:/app/logs        # partagé avec Promtail
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=db
    depends_on:
      db:
        condition: service_healthy

  # ─────────────────────────────────────────────
  #  FRONTEND FLUTTER WEB
  # ─────────────────────────────────────────────
  frontend:
    build: ./frontend/sedad_bank
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

  # ─────────────────────────────────────────────
  #  SOC — LOKI (stockage des logs)
  # ─────────────────────────────────────────────
  loki:
    image: grafana/loki:2.9.0
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./soc/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  #  SOC — PROMTAIL (collecte des logs)
  # ─────────────────────────────────────────────
  promtail:
    image: grafana/promtail:2.9.0
    restart: always
    volumes:
      - ./backend/logs:/var/log/django:ro   # logs Django en lecture seule
      - ./soc/promtail.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      loki:
        condition: service_healthy

  # ─────────────────────────────────────────────
  #  SOC — GRAFANA (dashboard + alertes email)
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.2.0
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./soc/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./soc/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=SedadSOC2024!
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST:-smtp.gmail.com:587}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_USER}
      - GF_SMTP_FROM_NAME=SEDAD BANK SOC
    depends_on:
      loki:
        condition: service_healthy

volumes:
  postgres_data:
  loki_data:
  grafana_data:
