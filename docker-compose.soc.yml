services:
  loki:
    image: grafana/loki:2.9.0
    restart: always
    ports:
      - "3100:3100"
    volumes:
      - ./soc/loki.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - soc-net
      - soc-bridge

  grafana:
    image: grafana/grafana:10.2.0
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - ./soc/grafana/grafana.ini:/etc/grafana/grafana.ini:ro
      - ./soc/grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=SedadSOC2024!
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${SMTP_HOST:-smtp.gmail.com:587}
      - GF_SMTP_USER=${SMTP_USER}
      - GF_SMTP_PASSWORD=${SMTP_PASSWORD}
      - GF_SMTP_FROM_ADDRESS=${SMTP_USER}
      - GF_SMTP_FROM_NAME=RSS BANK SOC
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - soc-net
      - soc-bridge

  fail2ban:
    image: crazymax/fail2ban:latest
    restart: always
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    volumes:
      - ./soc/fail2ban/jail.local:/etc/fail2ban/jail.local:ro
      - ./soc/fail2ban/filter.d:/etc/fail2ban/filter.d:ro
      - ./backend/logs:/var/log/apps:ro
      - fail2ban_data:/data

volumes:
  loki_data:
  grafana_data:
  fail2ban_data:

networks:
  soc-net:
  soc-bridge:
    external: true
